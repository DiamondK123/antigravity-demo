<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AR Duck Pet Game</title>
<style>
:root{--panel:rgba(8,12,24,.56);--panel-border:rgba(255,255,255,.10);--text:#f7fbff}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,"Microsoft JhengHei",sans-serif}
#app{position:relative;width:100%;height:100%;overflow:hidden;background:#000}
#camera{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;transform:scaleX(-1)}
#fx{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
.hud{position:absolute;z-index:20;left:12px;right:12px;top:12px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.panel{background:var(--panel);border:1px solid var(--panel-border);border-radius:18px;backdrop-filter:blur(12px);box-shadow:0 16px 36px rgba(0,0,0,.26);color:var(--text)}
.left{padding:12px 14px}.row1{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.title{display:flex;align-items:center;gap:10px}.avatar{width:42px;height:42px;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,rgba(255,213,74,.35),rgba(125,249,255,.22));border:1px solid rgba(255,255,255,.12);display:grid;place-items:center}.avatar img{width:100%;height:100%;object-fit:contain}
.game-name{font-size:18px;font-weight:800;letter-spacing:.3px}.sub{font-size:12px;opacity:.8}.badge{min-width:96px;padding:8px 10px;border-radius:14px;background:rgba(255,213,74,.12);border:1px solid rgba(255,213,74,.24);text-align:center;font-weight:700;color:#fff1a8;font-size:13px}
.stats{display:grid;grid-template-columns:60px 1fr 44px;gap:7px 8px;align-items:center}.label{font-size:12px;opacity:.88}.bar{height:10px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.06)}.fill{height:100%;border-radius:999px}.value{font-size:12px;text-align:right;color:#dfeeff}
.mission{padding:10px 12px;min-width:150px}.mission .m1{font-size:11px;color:#a9d7ff;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}.mission .m2{font-weight:700;font-size:14px;margin-bottom:4px}.mission .m3{font-size:12px;opacity:.82}
.status{position:absolute;z-index:18;left:50%;transform:translateX(-50%);bottom:118px;min-width:220px;max-width:min(86vw,460px);text-align:center;padding:10px 16px;border-radius:999px;background:rgba(8,12,24,.58);border:1px solid rgba(255,255,255,.10);color:#fff;font-weight:700;font-size:14px;backdrop-filter:blur(10px)}
.controls{position:absolute;z-index:20;left:12px;right:12px;bottom:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
button{border:1px solid var(--panel-border);background:rgba(10,16,28,.70);color:#fff;padding:12px 10px;border-radius:16px;font-size:14px;font-weight:700;backdrop-filter:blur(8px);cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.18)}button:active{transform:translateY(1px) scale(.995)}
.cam{background:rgba(255,255,255,.09)}.feed{background:rgba(255,213,74,.18);color:#fff6ca}.pet{background:rgba(255,141,179,.16);color:#ffe0ea}.play{background:rgba(121,242,255,.14);color:#dffcff}.mode{background:rgba(198,146,255,.14);color:#efe2ff}.skill{background:rgba(125,244,169,.15);color:#defbe7}
.tip{position:absolute;z-index:17;right:14px;bottom:126px;padding:10px 12px;border-radius:16px;background:rgba(8,12,24,.58);border:1px solid rgba(255,255,255,.10);color:#fff;backdrop-filter:blur(10px);text-align:right}.tip .t1{font-size:11px;opacity:.76}.tip .t2{font-size:21px;font-weight:800;color:#fff1a8}
</style>
</head>
<body>
<div id="app">
<video id="camera" playsinline autoplay muted></video>
<canvas id="fx"></canvas>
<div class="hud">
<div class="panel left">
<div class="row1">
<div class="title"><div class="avatar"><img src="duck_cutout.png" alt="duck"></div><div><div class="game-name">AR DUCK PET</div><div class="sub">Tap the ground to place your duck</div></div></div>
<div class="badge">🪙 <span id="coinVal">128</span></div>
</div>
<div class="stats">
<div class="label">HP</div><div class="bar"><div id="hpBar" class="fill" style="width:88%;background:#ff6b6b"></div></div><div id="hpVal" class="value">88</div>
<div class="label">FULL</div><div class="bar"><div id="foodBar" class="fill" style="width:72%;background:#ffd54a"></div></div><div id="foodVal" class="value">72</div>
<div class="label">ENERGY</div><div class="bar"><div id="energyBar" class="fill" style="width:80%;background:#79f2ff"></div></div><div id="energyVal" class="value">80</div>
<div class="label">BOND</div><div class="bar"><div id="bondBar" class="fill" style="width:30%;background:#c692ff"></div></div><div id="bondVal" class="value">30</div>
</div>
</div>
<div class="panel mission">
<div class="m1">MISSION</div>
<div id="missionTitle" class="m2">Place the Duck</div>
<div id="missionHint" class="m3">Tap a flat area in view</div>
</div>
</div>
<div id="statusBox" class="status">Press START, then tap the floor to place your duck</div>
<div class="tip"><div class="t1">MODE</div><div id="modeVal" class="t2">PLACE</div></div>
<div class="controls">
<button id="startBtn" class="cam">START</button>
<button id="feedBtn" class="feed">FEED</button>
<button id="petBtn" class="pet">PET</button>
<button id="playBtn" class="play">PLAY</button>
<button id="modeBtn" class="mode">MODE</button>
<button id="skillBtn" class="skill">BURST</button>
</div>
</div>
<script>
const video=document.getElementById('camera'),canvas=document.getElementById('fx'),ctx=canvas.getContext('2d'),statusBox=document.getElementById('statusBox');
const startBtn=document.getElementById('startBtn'),feedBtn=document.getElementById('feedBtn'),petBtn=document.getElementById('petBtn'),playBtn=document.getElementById('playBtn'),modeBtn=document.getElementById('modeBtn'),skillBtn=document.getElementById('skillBtn');
const hpBar=document.getElementById('hpBar'),foodBar=document.getElementById('foodBar'),energyBar=document.getElementById('energyBar'),bondBar=document.getElementById('bondBar'),hpVal=document.getElementById('hpVal'),foodVal=document.getElementById('foodVal'),energyVal=document.getElementById('energyVal'),bondVal=document.getElementById('bondVal'),coinVal=document.getElementById('coinVal'),missionTitle=document.getElementById('missionTitle'),missionHint=document.getElementById('missionHint'),modeVal=document.getElementById('modeVal');
let w=0,h=0,dpr=Math.max(1,window.devicePixelRatio||1),lastTime=0,particles=[],rings=[],foods=[],audioCtx=null,placed=false,coins=128,mode=0,dragging=false,dragDX=0,dragDY=0;
const duckImg=new Image();duckImg.src='duck_cutout.png';
const palettes=[{glow1:'255,224,102',glow2:'255,159,28',ring:'#ffd54a',ring2:'#ff9f1c'},{glow1:'255,243,176',glow2:'255,143,171',ring:'#fff3b0',ring2:'#ff8db3'},{glow1:'249,231,105',glow2:'125,249,255',ring:'#f9e769',ring2:'#79f2ff'}];let paletteIndex=0;
const pet={x:0,y:0,targetX:0,targetY:0,baseX:0,baseY:0,vx:0,vy:0,t:0,bobT:0,auraSpin:0,hp:88,food:72,energy:80,bond:30,eatTimer:0,petTimer:0,playTimer:0,burstPower:0,floorY:0};
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function getPalette(){return palettes[paletteIndex]}
function status(text){statusBox.textContent=text}
function ensureAudio(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}if(audioCtx.state==='suspended')audioCtx.resume()}
function quackCute(level=1){ensureAudio();const now=audioCtx.currentTime;const freqs=level===2?[770,610,690]:[720,560];freqs.forEach((f,i)=>{const osc=audioCtx.createOscillator(),gain=audioCtx.createGain(),filter=audioCtx.createBiquadFilter();osc.type='square';filter.type='bandpass';filter.frequency.value=1000+i*170;osc.frequency.setValueAtTime(f,now+i*0.05);osc.frequency.exponentialRampToValueAtTime(Math.max(220,f*0.6),now+i*0.05+0.12);gain.gain.setValueAtTime(0.0001,now+i*0.05);gain.gain.exponentialRampToValueAtTime(0.055,now+i*0.05+0.01);gain.gain.exponentialRampToValueAtTime(0.0001,now+i*0.05+0.13);osc.connect(filter).connect(gain).connect(audioCtx.destination);osc.start(now+i*0.05);osc.stop(now+i*0.05+0.15)})}
function rewardSound(){ensureAudio();const now=audioCtx.currentTime;[560,780,980].forEach((f,i)=>{const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.type='triangle';osc.frequency.setValueAtTime(f,now+i*0.04);gain.gain.setValueAtTime(0.0001,now+i*0.04);gain.gain.exponentialRampToValueAtTime(0.03,now+i*0.04+0.01);gain.gain.exponentialRampToValueAtTime(0.0001,now+i*0.04+0.08);osc.connect(gain).connect(audioCtx.destination);osc.start(now+i*0.04);osc.stop(now+i*0.04+0.1)})}
function resize(){dpr=Math.max(1,window.devicePixelRatio||1);w=window.innerWidth;h=window.innerHeight;canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(dpr,0,0,dpr,0,0);if(!placed){pet.x=w*0.5;pet.y=h*0.72;pet.floorY=pet.y}}
window.addEventListener('resize',resize);resize();
function updateUI(){hpBar.style.width=pet.hp+'%';hpVal.textContent=Math.round(pet.hp);foodBar.style.width=pet.food+'%';foodVal.textContent=Math.round(pet.food);energyBar.style.width=pet.energy+'%';energyVal.textContent=Math.round(pet.energy);bondBar.style.width=pet.bond+'%';bondVal.textContent=Math.round(pet.bond);coinVal.textContent=coins;modeVal.textContent=!placed?'PLACE':(mode===0?'FLOAT':mode===1?'ORBIT':'FOLLOW');if(!placed){missionTitle.textContent='Place the Duck';missionHint.textContent='Tap a flat area in view'}else if(pet.food<85){missionTitle.textContent='Feed the Duck';missionHint.textContent='Raise FULL above 85'}else if(pet.bond<60){missionTitle.textContent='Build Trust';missionHint.textContent='Raise BOND above 60'}else if(pet.energy<70){missionTitle.textContent='Boost Energy';missionHint.textContent='Raise ENERGY above 70'}else{missionTitle.textContent='AR Pet Time';missionHint.textContent='Move, play and burst'}}
updateUI();
function addCoins(n){coins+=n;rewardSound();updateUI()}
function emitParticles(x,y,count=18,style='spark'){const pal=getPalette();const emojis=style==='heart'?['❤','♡','💛']:['✨','★','✦','💫'];for(let i=0;i<count;i++){const angle=Math.random()*Math.PI*2,speed=Math.random()*4+(style==='burst'?3:1);particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-(style==='trail'?0.8:0),life:style==='trail'?18+Math.random()*10:28+Math.random()*22,maxLife:style==='trail'?28:50,size:style==='trail'?2+Math.random()*2.5:4+Math.random()*6,color:Math.random()>.5?pal.glow1:pal.glow2,kind:style,rot:Math.random()*Math.PI*2,text:emojis[Math.floor(Math.random()*emojis.length)]})}}
function addRing(x,y,r,kind='pulse'){rings.push({x,y,r,life:40,maxLife:40,kind})}
function placeDuck(x,y){placed=true;pet.x=x;pet.y=y;pet.floorY=y;pet.baseX=x;pet.baseY=y;pet.targetX=x;pet.targetY=y;emitParticles(x,y-10,24,'spark');addRing(x,y+10,26,'pulse');quackCute(2);status('Duck placed');updateUI()}
function feedPet(){if(!placed){status('Place the duck first');return}pet.food=clamp(pet.food+18,0,100);pet.hp=clamp(pet.hp+4,0,100);pet.energy=clamp(pet.energy+5,0,100);pet.bond=clamp(pet.bond+3,0,100);pet.eatTimer=2;foods.push({x:w*0.5,y:h-70,targetX:pet.x,targetY:pet.y-12,emoji:'🌽',life:70});emitParticles(pet.x,pet.y-10,20,'spark');addRing(pet.x,pet.y,28,'pulse');quackCute(1);addCoins(8);status('FEED +8 COINS');updateUI()}
function petAction(){if(!placed){status('Place the duck first');return}pet.bond=clamp(pet.bond+8,0,100);pet.hp=clamp(pet.hp+3,0,100);pet.energy=clamp(pet.energy-2,0,100);pet.petTimer=2.2;emitParticles(pet.x,pet.y-30,22,'heart');addRing(pet.x,pet.y-8,22,'pulse');quackCute(1);addCoins(6);status('PET +6 COINS');updateUI()}
function playAction(){if(!placed){status('Place the duck first');return}pet.energy=clamp(pet.energy-10,0,100);pet.food=clamp(pet.food-6,0,100);pet.hp=clamp(pet.hp+8,0,100);pet.bond=clamp(pet.bond+6,0,100);pet.playTimer=3;pet.burstPower=18;emitParticles(pet.x,pet.y,36,'burst');addRing(pet.x,pet.y,36,'burst');quackCute(2);addCoins(10);status('PLAY +10 COINS');updateUI()}
function burstAction(){if(!placed){status('Place the duck first');return}if(pet.energy<12){status('NOT ENOUGH ENERGY');quackCute(1);return}pet.energy=clamp(pet.energy-12,0,100);pet.burstPower=34;emitParticles(pet.x,pet.y,60,'burst');addRing(pet.x,pet.y,40,'burst');quackCute(2);addCoins(12);status('BURST +12 COINS');updateUI()}
startBtn.addEventListener('click',async()=>{try{ensureAudio();const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});video.srcObject=stream;await video.play();quackCute(2);status('Tap where you want the duck to stand')}catch(err){console.error(err);status('CAMERA OFFLINE · USE ARENA MODE')}})
feedBtn.addEventListener('click',feedPet);petBtn.addEventListener('click',petAction);playBtn.addEventListener('click',playAction);skillBtn.addEventListener('click',burstAction);
modeBtn.addEventListener('click',()=>{if(!placed){status('Place the duck first');return}mode=(mode+1)%3;paletteIndex=(paletteIndex+1)%palettes.length;emitParticles(pet.x,pet.y,18,'spark');addRing(pet.x,pet.y,24,'pulse');quackCute(1);status(['FLOAT MODE','ORBIT MODE','FOLLOW MODE'][mode]);updateUI()});
function passiveDecay(dt){pet.food=clamp(pet.food-0.007*dt,0,100);pet.energy=clamp(pet.energy-0.006*dt,0,100);pet.hp=clamp(pet.hp-(pet.food<20?0.015*dt:0.002*dt),0,100);if(pet.energy<25)pet.hp=clamp(pet.hp-0.01*dt,0,100)}
function updatePet(dt){pet.t+=0.018*dt;pet.bobT+=0.03*dt;pet.auraSpin+=0.028*dt;if(pet.burstPower>0)pet.burstPower-=0.7*dt;if(pet.eatTimer>0)pet.eatTimer-=0.016*dt;if(pet.playTimer>0)pet.playTimer-=0.016*dt;if(pet.petTimer>0)pet.petTimer-=0.016*dt;passiveDecay(dt);if(!placed||dragging)return;if(mode===0){const tx=pet.baseX+Math.cos(pet.t*0.8)*16,ty=pet.baseY+Math.sin(pet.t*1.9)*8;pet.vx+=(tx-pet.x)*0.032;pet.vy+=(ty-pet.y)*0.032}else if(mode===1){const radius=48+Math.sin(pet.t*1.3)*10,tx=pet.baseX+Math.cos(pet.t*1.4)*radius,ty=pet.baseY+Math.sin(pet.t*1.4)*radius*0.18;pet.vx+=(tx-pet.x)*0.05;pet.vy+=(ty-pet.y)*0.05}else{pet.vx+=(pet.targetX-pet.x)*0.03;pet.vy+=(pet.targetY-pet.y)*0.03;pet.vy+=Math.sin(pet.t*2.1)*0.06}pet.vx*=0.88;pet.vy*=0.88;pet.x+=pet.vx*dt;pet.y+=pet.vy*dt;if(Math.random()<0.18)emitParticles(pet.x+(Math.random()-0.5)*18,pet.y+24,1,'trail');if(Math.random()<0.03)addRing(pet.x,pet.floorY+10,8+Math.random()*8,'micro');updateUI()}
function drawFloorGuide(){if(placed)return;ctx.save();const y=h*0.74;ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=2;ctx.setLineDash([10,8]);ctx.beginPath();ctx.moveTo(w*0.15,y);ctx.lineTo(w*0.85,y);ctx.stroke();ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.ellipse(w*0.5,y+6,80,18,0,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawBackgroundOverlay(){ctx.save();const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'rgba(8,16,36,0.14)');g.addColorStop(1,'rgba(14,8,26,0.18)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);const pal=getPalette();const beam1=ctx.createRadialGradient(w*0.22,h*0.24,10,w*0.22,h*0.24,w*0.42);beam1.addColorStop(0,'rgba('+pal.glow1+',0.15)');beam1.addColorStop(1,'rgba('+pal.glow1+',0)');ctx.fillStyle=beam1;ctx.fillRect(0,0,w,h);ctx.restore()}
function drawShadow(){if(!placed)return;const hover=Math.max(0,pet.floorY-pet.y),width=Math.max(40,82-hover*0.24),alpha=Math.max(0.10,0.22-hover*0.002);ctx.save();ctx.fillStyle='rgba(0,0,0,'+alpha+')';ctx.beginPath();ctx.ellipse(pet.x,pet.floorY+42,width,18,0,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawEnergy(){if(!placed)return;const pal=getPalette();const beam=ctx.createLinearGradient(pet.x,pet.y-140,pet.x,pet.floorY+70);beam.addColorStop(0,'rgba(255,255,255,0)');beam.addColorStop(0.35,'rgba('+pal.glow1+',0.10)');beam.addColorStop(0.75,'rgba('+pal.glow2+',0.15)');beam.addColorStop(1,'rgba(255,255,255,0)');ctx.save();ctx.fillStyle=beam;ctx.beginPath();ctx.ellipse(pet.x,(pet.y+pet.floorY)/2+20,46,140,0,0,Math.PI*2);ctx.fill();ctx.restore();ctx.save();ctx.translate(pet.x,pet.floorY+44);ctx.rotate(pet.auraSpin);ctx.strokeStyle=pal.ring;ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(0,0,82+Math.sin(pet.auraSpin*2)*2,18,0,0,Math.PI*2);ctx.stroke();for(let i=0;i<12;i++){const a=(Math.PI*2/12)*i+pet.auraSpin*1.6;ctx.fillStyle=i%2?pal.ring2:'#fff';ctx.beginPath();ctx.arc(Math.cos(a)*82,Math.sin(a)*18,2.7,0,Math.PI*2);ctx.fill()}ctx.restore()}
function drawDuck(){if(!placed||!duckImg.complete)return;drawShadow();drawEnergy();const bob=Math.sin(pet.bobT*4)*4+(pet.playTimer>0?Math.sin(pet.bobT*14)*5:0),scale=1+Math.sin(pet.bobT*3)*0.01+pet.burstPower*0.0016;ctx.save();ctx.translate(pet.x,pet.y+bob);ctx.scale(scale,scale);const glow=ctx.createRadialGradient(0,0,22,0,0,130);glow.addColorStop(0,'rgba(255,255,255,.12)');glow.addColorStop(0.35,'rgba(255,224,102,.18)');glow.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,0,128,0,Math.PI*2);ctx.fill();const drawH=235,drawW=drawH*(duckImg.width/duckImg.height);ctx.drawImage(duckImg,-drawW/2,-drawH/2,drawW,drawH);ctx.restore()}
function drawNameplate(){if(!placed)return;const text='DUCKY · '+(mode===0?'FLOAT':mode===1?'ORBIT':'FOLLOW');ctx.save();ctx.font='bold 13px Arial';const width=ctx.measureText(text).width+28,x=pet.x-width/2,y=pet.y-150;ctx.fillStyle='rgba(8,12,24,.60)';ctx.strokeStyle='rgba(255,255,255,.14)';ctx.lineWidth=1;roundedRectPath(x,y,width,30,14);ctx.fill();ctx.stroke();ctx.fillStyle='#fff';ctx.fillText(text,pet.x-ctx.measureText(text).width/2,y+19);ctx.restore()}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.985;p.vy*=p.kind==='trail'?0.98:0.988;if(p.kind!=='trail')p.vy+=0.02;p.life-=1;if(p.life<=0){particles.splice(i,1);continue}const a=p.life/p.maxLife;ctx.save();ctx.globalAlpha=a;ctx.translate(p.x,p.y);ctx.rotate(p.rot+=0.02);if(p.kind==='trail'){ctx.fillStyle='rgba('+p.color+','+Math.max(0.15,a*0.9)+')';ctx.shadowBlur=12;ctx.shadowColor='rgba('+p.color+',1)';ctx.beginPath();ctx.arc(0,0,p.size,0,Math.PI*2);ctx.fill()}else if(p.kind==='heart'){ctx.font=(12+p.size)+'px Arial';ctx.fillText(p.text,0,0)}else{ctx.fillStyle='rgba('+p.color+','+Math.max(0.2,a)+')';ctx.shadowBlur=16;ctx.shadowColor='rgba('+p.color+',1)';drawDiamond(0,0,p.size);ctx.fill()}ctx.restore()}}
function updateRings(){for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.life-=1;if(r.life<=0){rings.splice(i,1);continue}const a=r.life/r.maxLife,grow=(1-a)*36,pal=getPalette();ctx.save();ctx.strokeStyle=r.kind==='burst'?'rgba('+pal.glow2+','+a+')':'rgba('+pal.glow1+','+(a*0.8)+')';ctx.lineWidth=r.kind==='burst'?3:1.5;ctx.beginPath();ctx.arc(r.x,r.y,r.r+grow,0,Math.PI*2);ctx.stroke();ctx.restore()}}
function updateFoods(){for(let i=foods.length-1;i>=0;i--){const f=foods[i];f.life-=1;f.x+=(f.targetX-f.x)*0.12;f.y+=(f.targetY-f.y)*0.12;if(Math.hypot(f.x-f.targetX,f.y-f.targetY)<16||f.life<=0){emitParticles(f.targetX,f.targetY,14,'heart');quackCute(1);foods.splice(i,1);continue}ctx.save();ctx.globalAlpha=Math.max(0.3,f.life/70);ctx.font='28px Arial';ctx.fillText(f.emoji,f.x,f.y);ctx.restore()}}
function drawDiamond(x,y,s){ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s,y);ctx.lineTo(x,y+s);ctx.lineTo(x-s,y);ctx.closePath()}
function roundedRectPath(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y)}
function animate(ts){requestAnimationFrame(animate);const dt=Math.min(32,ts-lastTime||16)/16.666;lastTime=ts;ctx.clearRect(0,0,w,h);drawBackgroundOverlay();drawFloorGuide();updatePet(dt);drawDuck();drawNameplate();updateFoods();updateParticles();updateRings()}
function getPoint(e){if(e.touches&&e.touches[0])return{x:e.touches[0].clientX,y:e.touches[0].clientY};return{x:e.clientX,y:e.clientY}}
function onDown(e){const p=getPoint(e);if(!placed){placeDuck(p.x,Math.max(h*0.52,p.y));e.preventDefault();return}const d=Math.hypot(p.x-pet.x,p.y-pet.y);if(d<120){dragging=true;dragDX=p.x-pet.x;dragDY=p.y-pet.y;pet.vx=0;pet.vy=0;petAction();e.preventDefault()}else{pet.targetX=p.x;pet.targetY=Math.max(h*0.48,p.y);emitParticles(p.x,p.y,16,'spark');addRing(p.x,p.y,16,'pulse');quackCute(1)}}
function onMove(e){if(!dragging)return;const p=getPoint(e);pet.x=p.x-dragDX;pet.y=Math.max(h*0.48,p.y-dragDY);pet.floorY=pet.y;pet.baseX=pet.x;pet.baseY=pet.y;emitParticles(pet.x,pet.y,1,'trail');e.preventDefault()}
function onUp(){dragging=false}
canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});window.addEventListener('touchend',onUp);
status('Press START, then tap the floor to place your duck');requestAnimationFrame(animate);
</script>
